<body style='background:black; margin:0; overflow:hidden;'>
    <div id="loading-indicator" style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: #0a0a0f;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 99999;
        font-family: 'Outfit', 'Roboto', sans-serif;
        color: #818181;
        transition: opacity 0.5s ease;
    ">
        <div style="
            width: 32px;
            height: 32px;
            border: 2px solid rgba(119, 170, 255, 0.1);
            border-top: 2px solid #868686;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 12px;
        "></div>
        <div style="font-size: 11px; font-weight: 600; letter-spacing: 1px;">LOADING...</div>
        <style>
            @keyframes spin {
                0% {
                    transform: rotate(0deg);
                }

                100% {
                    transform: rotate(360deg);
                }
            }
        </style>
    </div>
</body>
